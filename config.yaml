# Переменные по умолчанию
#
seaf2drawio:
  # Можно указывать как отдельные файлы, так и директории (будут загружены все .yaml/.yml файлы)
  data_yaml_file: 
    - data/example/
  drawio_pattern: data/base.drawio
  #  drawio_pattern: data/base_for_example.drawio
  output_file: result/Sample_graph.drawio
  verify_generation: true
  auto_layout_grid: true

  # Общая страница собирается после генерации основных листов Office/DC.
  # Она копирует готовые страницы в один вертикальный стек и не участвует
  # в проверке соответствия YAML, потому что не добавляет новых SEAF-сущностей.
  common_location_page: true

  # Имя итоговой страницы в DrawIO.
  common_location_page_name: "Общая схема"

  # Вертикальный зазор между скопированными схемами офисов/ЦОДов.
  common_location_page_gap: 120

  # Зоны, из которых провайдерские WAN-сети дедуплицируются:
  # одинаковые provider-узлы выносятся вправо как общие узлы, а связи
  # скопированных страниц переподключаются к ним.
  common_location_provider_zones:
    - INTERNET
    - INET-EDGE
  auto_layout_script: scripts/layout_tech_services.py
  auto_layout_diagram: all
# auto_layout_filter: DC,ЦОД,Office,Офис,Головной
#  link_style: straight  # опционально: устанавливает прямые связи вместо угловых

drawio2seaf:
  schema_file: data/seaf_schema.yaml
  drawio_file: result/Sample_graph.drawio
  output_file: result/seaf.yaml
