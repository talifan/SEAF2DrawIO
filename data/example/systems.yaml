#  сервисы систем
seaf.company.services:
  jupiter.srv.mq_via_esb:
    title: MQ 03
    lifecycle_stage: Используется
    description: |
      Сервис транспортировки MQ сообщений через КСШ. 
      Используеться для передачи информации между различными системами в периметре компании

  jupiter.srv.msg_via_kafka:
    title: Kafka
    lifecycle_stage: Используется
    description: |
      Сервис транспортировки сообщений через Kafka.
      Сервисная функция по доставке сообщений от системы А к системе Б через топики Кафки

  jupiter.srv.gateway_vorona11:
    title: ШПУ 11
    lifecycle_stage: Используется
    description: Сервис шлюзования сообщений прикладного уровня на базе АС Ворона

  jupiter.srv.gateway_vorona17:
    title: ШПУ 17
    lifecycle_stage: Используется
    description: Сервис шлюзования сообщений прикладного уровня на базе АС Ворона

